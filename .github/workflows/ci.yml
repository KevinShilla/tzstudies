name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov ruff
      - run: python -m pytest tests/ -v --tb=short --cov=tzstudies --cov-report=term-missing
      - run: ruff check tzstudies/ tests/ --ignore=E501
