[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length handled by line-length setting

[tool.ruff.lint.isort]
known-first-party = ["tzstudies"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
