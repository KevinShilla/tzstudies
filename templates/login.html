{% extends "base.html" %}
{% block title %}Log In — TZStudies{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h2>Log In</h2>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Your password" required>
      </div>

      <button type="submit" class="btn btn-full">Log In</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
    <p class="auth-link">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
  </div>
</div>
{% endblock %}
