{% extends "base.html" %}
{% block title %}Reset Password — TZStudies{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" placeholder="At least 6 characters" required minlength="6" autofocus>
      </div>

      <button type="submit" class="btn btn-full">Reset Password</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
  </div>
</div>
{% endblock %}
