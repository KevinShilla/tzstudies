{% extends "base.html" %}
{% block title %}Sign Up|TZStudies{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" name="name" placeholder="John Doe" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="At least 6 characters" required minlength="6">
      </div>

      <button type="submit" class="btn btn-full">Sign Up</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a></p>
  </div>
</div>
{% endblock %}
