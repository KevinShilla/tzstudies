{% extends "base.html" %}
{% block title %}Forgot Password — TZStudies{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h2>Forgot Password</h2>
    <p style="text-align:center;color:#666;margin-bottom:1.5rem;">Enter your email and we'll send you a reset link.</p>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autofocus>
      </div>

      <button type="submit" class="btn btn-full">Send Reset Link</button>
    </form>
    <p class="auth-link">Remember your password? <a href="{{ url_for('auth.login') }}">Log In</a></p>
  </div>
</div>
{% endblock %}
